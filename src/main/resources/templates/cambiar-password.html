<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambiar contraseña - MiBombay</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="mb-auth">
    <div th:replace="~{fragments/navbar :: navbar}"></div>
    
    <main class="mb-main d-flex align-items-center">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-6 col-lg-5">
                    <div class="card shadow-lg border-0">
                        <div class="card-body p-5">
                            <div class="text-center mb-4">
                                <i class="bi bi-key-fill text-primary fs-1"></i>
                                <h1 class="h3 mt-3">Cambiar contraseña</h1>
                                <p class="text-muted">Debes cambiar tu contraseña temporal para continuar</p>
                            </div>
                            
                            <div th:if="${error}" class="alert alert-danger" role="alert">
                                <i class="bi bi-exclamation-triangle-fill me-2"></i>
                                <span th:text="${error}">Error</span>
                            </div>
                            
                            <form th:action="@{/cambiar-password}" method="post">
                                <div class="form-floating mb-3">
                                    <input type="password" class="form-control" id="nuevaPassword" 
                                           name="nuevaPassword" placeholder="Nueva contraseña" required minlength="8">
                                    <label for="nuevaPassword">Nueva contraseña</label>
                                    <small class="form-text text-muted">Mínimo 8 caracteres</small>
                                </div>
                                
                                <div class="form-floating mb-4">
                                    <input type="password" class="form-control" id="confirmarPassword" 
                                           name="confirmarPassword" placeholder="Confirmar contraseña" required>
                                    <label for="confirmarPassword">Confirmar contraseña</label>
                                </div>
                                
                                <button type="submit" class="btn btn-primary w-100 btn-lg">
                                    <i class="bi bi-check-circle me-2"></i>Cambiar contraseña
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    
    <div th:replace="~{fragments/footer :: footer}"></div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/app.js}"></script>
</body>
</html>
