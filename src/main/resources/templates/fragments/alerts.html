<div th:fragment="alerts" class="container-fluid">
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show mb-alert" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <span th:text="${error}">Error</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${mensaje}" class="alert alert-success alert-dismissible fade show mb-alert" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i>
        <span th:text="${mensaje}">Mensaje</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
</div>
