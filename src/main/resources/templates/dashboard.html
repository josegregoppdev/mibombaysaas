<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - MiBombay</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="mb-dashboard">
    <div th:replace="~{fragments/navbar :: navbar}"></div>
    
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-3 col-lg-2 mb-sidebar-col">
                <div th:replace="~{fragments/sidebar :: sidebar}"></div>
            </div>
            
            <main class="col-md-9 col-lg-10 mb-main-col">
                <div th:if="${mensaje}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <i class="bi bi-check-circle-fill me-2"></i>
                    <span th:text="${mensaje}">Mensaje</span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                
                <div class="mb-dashboard-header">
                    <h1 class="display-6">Dashboard</h1>
                    <p class="lead text-muted">
                        Bienvenido a <strong th:text="${empresa.nombre}">Mi empresa</strong>
                    </p>
                </div>
                
                <div class="row g-4 mb-4">
                    <div class="col-md-6">
                        <div class="card border-0 shadow-sm h-100">
                            <div class="card-body">
                                <h5 class="card-title">
                                    <i class="bi bi-building text-primary me-2"></i>
                                    Información de la empresa
                                </h5>
                                <dl class="row mb-0">
                                    <dt class="col-sm-4">Nombre:</dt>
                                    <dd class="col-sm-8" th:text="${empresa.nombre}">-</dd>
                                    
                                    <dt class="col-sm-4">Correo:</dt>
                                    <dd class="col-sm-8" th:text="${empresa.correo}">-</dd>
                                    
                                    <dt class="col-sm-4">Teléfono:</dt>
                                    <dd class="col-sm-8" th:text="${empresa.telefono ?: 'No especificado'}">-</dd>
                                    
                                    <dt class="col-sm-4">Dirección:</dt>
                                    <dd class="col-sm-8" th:text="${empresa.direccion}">-</dd>
                                </dl>
                            </div>
                        </div>
                    </div>
                    
                    <div class="col-md-6">
                        <div class="card border-0 shadow-sm h-100">
                            <div class="card-body">
                                <h5 class="card-title">
                                    <i class="bi bi-person-circle text-primary me-2"></i>
                                    Tu perfil
                                </h5>
                                <dl class="row mb-3">
                                    <dt class="col-sm-4">Nombre:</dt>
                                    <dd class="col-sm-8" th:text="${usuario.nombreCompleto}">-</dd>
                                    
                                    <dt class="col-sm-4">Email:</dt>
                                    <dd class="col-sm-8" th:text="${usuario.email}">-</dd>
                                    
                                    <dt class="col-sm-4">Rol:</dt>
                                    <dd class="col-sm-8">
                                        <span class="badge bg-primary" th:text="${usuario.rol}">-</span>
                                    </dd>
                                </dl>
                                <a th:href="@{/cambiar-password}" class="btn btn-outline-primary btn-sm">
                                    <i class="bi bi-key me-2"></i>Cambiar contraseña
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="mb-4">
                    <h2 class="h4 mb-4">Acciones rápidas</h2>
                    <div class="row g-3">
                        <div class="col-md-6 col-lg-3">
                            <div class="card border-0 shadow-sm h-100 disabled opacity-50">
                                <div class="card-body text-center">
                                    <i class="bi bi-grid-3x3-gap text-primary fs-1 mb-3"></i>
                                    <h5>Gestión de mesas</h5>
                                    <p class="text-muted small mb-0">Próximamente</p>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6 col-lg-3">
                            <div class="card border-0 shadow-sm h-100 disabled opacity-50">
                                <div class="card-body text-center">
                                    <i class="bi bi-book text-primary fs-1 mb-3"></i>
                                    <h5>Menú</h5>
                                    <p class="text-muted small mb-0">Próximamente</p>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6 col-lg-3">
                            <div class="card border-0 shadow-sm h-100 disabled opacity-50">
                                <div class="card-body text-center">
                                    <i class="bi bi-receipt text-primary fs-1 mb-3"></i>
                                    <h5>Pedidos</h5>
                                    <p class="text-muted small mb-0">Próximamente</p>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6 col-lg-3">
                            <div class="card border-0 shadow-sm h-100 disabled opacity-50">
                                <div class="card-body text-center">
                                    <i class="bi bi-graph-up text-primary fs-1 mb-3"></i>
                                    <h5>Reportes</h5>
                                    <p class="text-muted small mb-0">Próximamente</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/app.js}"></script>
</body>
</html>
