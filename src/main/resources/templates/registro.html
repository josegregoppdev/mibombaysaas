<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - MiBombay</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="mb-auth">
    <div th:replace="~{fragments/navbar :: navbar}"></div>
    
    <main class="mb-main py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-10">
                    <div class="text-center mb-4">
                        <h1 class="display-6">Crea tu empresa</h1>
                        <p class="text-muted">Completa los datos para empezar a usar MiBombay</p>
                    </div>
                    
                    <div th:if="${error}" class="alert alert-danger" role="alert">
                        <i class="bi bi-exclamation-triangle-fill me-2"></i>
                        <span th:text="${error}">Error</span>
                    </div>
                    
                    <form th:action="@{/registro}" th:object="${empresa}" method="post">
                        <div class="row g-4">
                            <div class="col-md-6">
                                <div class="card shadow-sm border-0 h-100">
                                    <div class="card-body p-4">
                                        <h5 class="card-title mb-4">
                                            <i class="bi bi-building text-primary me-2"></i>
                                            Datos de la empresa
                                        </h5>
                                        
                                        <div class="form-floating mb-3">
                                            <input type="text" class="form-control" th:field="*{nombre}" 
                                                   th:classappend="${#fields.hasErrors('nombre')} ? 'is-invalid'" 
                                                   id="nombre" placeholder="Mi Restaurante" required>
                                            <label for="nombre">Nombre de la empresa *</label>
                                            <div class="invalid-feedback" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></div>
                                        </div>
                                        
                                        <div class="form-floating mb-3">
                                            <input type="text" class="form-control" th:field="*{subdominio}" 
                                                   th:classappend="${#fields.hasErrors('subdominio')} ? 'is-invalid'" 
                                                   id="subdominio" placeholder="mi-restaurante" required
                                                   pattern="^[a-z0-9-]+$">
                                            <label for="subdominio">Subdominio *</label>
                                            <div class="invalid-feedback" th:if="${#fields.hasErrors('subdominio')}" th:errors="*{subdominio}"></div>
                                            <small class="form-text text-muted">Solo letras minúsculas, números y guiones (3-60 caracteres)</small>
                                        </div>
                                        
                                        <div class="form-floating mb-3">
                                            <input type="email" class="form-control" th:field="*{correo}" 
                                                   th:classappend="${#fields.hasErrors('correo')} ? 'is-invalid'" 
                                                   id="correo" placeholder="contacto@empresa.com" required>
                                            <label for="correo">Correo de contacto *</label>
                                            <div class="invalid-feedback" th:if="${#fields.hasErrors('correo')}" th:errors="*{correo}"></div>
                                        </div>
                                        
                                        <div class="form-floating mb-3">
                                            <input type="tel" class="form-control" th:field="*{telefono}" 
                                                   id="telefono" placeholder="+54 11 1234-5678">
                                            <label for="telefono">Teléfono</label>
                                        </div>
                                        
                                        <div class="form-floating mb-3">
                                            <input type="text" class="form-control" th:field="*{direccion}" 
                                                   th:classappend="${#fields.hasErrors('direccion')} ? 'is-invalid'" 
                                                   id="direccion" placeholder="Av. Siempre Viva 123" required>
                                            <label for="direccion">Dirección *</label>
                                            <div class="invalid-feedback" th:if="${#fields.hasErrors('direccion')}" th:errors="*{direccion}"></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="col-md-6">
                                <div class="card shadow-sm border-0 h-100">
                                    <div class="card-body p-4">
                                        <h5 class="card-title mb-4">
                                            <i class="bi bi-person-badge text-primary me-2"></i>
                                            Datos del encargado
                                        </h5>
                                        
                                        <div class="form-floating mb-3">
                                            <input type="text" class="form-control" th:field="*{nombreEncargado}" 
                                                   th:classappend="${#fields.hasErrors('nombreEncargado')} ? 'is-invalid'" 
                                                   id="nombreEncargado" placeholder="Juan Pérez" required>
                                            <label for="nombreEncargado">Nombre completo *</label>
                                            <div class="invalid-feedback" th:if="${#fields.hasErrors('nombreEncargado')}" th:errors="*{nombreEncargado}"></div>
                                        </div>
                                        
                                        <div class="form-floating mb-3">
                                            <input type="email" class="form-control" th:field="*{emailEncargado}" 
                                                   th:classappend="${#fields.hasErrors('emailEncargado')} ? 'is-invalid'" 
                                                   id="emailEncargado" placeholder="juan@empresa.com" required>
                                            <label for="emailEncargado">Email (será tu usuario) *</label>
                                            <div class="invalid-feedback" th:if="${#fields.hasErrors('emailEncargado')}" th:errors="*{emailEncargado}"></div>
                                        </div>
                                        
                                        <div class="form-floating mb-3">
                                            <input type="tel" class="form-control" th:field="*{telefonoEncargado}" 
                                                   id="telefonoEncargado" placeholder="+54 11 9876-5432">
                                            <label for="telefonoEncargado">Teléfono</label>
                                        </div>
                                        
                                        <div class="form-floating mb-3">
                                            <input type="text" class="form-control" th:field="*{documentoEncargado}" 
                                                   th:classappend="${#fields.hasErrors('documentoEncargado')} ? 'is-invalid'" 
                                                   id="documentoEncargado" placeholder="12345678" required>
                                            <label for="documentoEncargado">Documento/Cédula *</label>
                                            <div class="invalid-feedback" th:if="${#fields.hasErrors('documentoEncargado')}" th:errors="*{documentoEncargado}"></div>
                                        </div>
                                        
                                        <div class="form-floating mb-3">
                                            <input type="password" class="form-control" th:field="*{passwordEncargado}" 
                                                   th:classappend="${#fields.hasErrors('passwordEncargado')} ? 'is-invalid'" 
                                                   id="passwordEncargado" placeholder="Contraseña" required minlength="8">
                                            <label for="passwordEncargado">Contraseña *</label>
                                            <div class="invalid-feedback" th:if="${#fields.hasErrors('passwordEncargado')}" th:errors="*{passwordEncargado}"></div>
                                            <small class="form-text text-muted">Mínimo 8 caracteres</small>
                                        </div>
                                        
                                        <div class="form-floating mb-3">
                                            <input type="password" class="form-control" th:field="*{confirmarPasswordEncargado}" 
                                                   th:classappend="${#fields.hasErrors('confirmarPasswordEncargado')} ? 'is-invalid'" 
                                                   id="confirmarPasswordEncargado" placeholder="Confirmar contraseña" required>
                                            <label for="confirmarPasswordEncargado">Confirmar contraseña *</label>
                                            <div class="invalid-feedback" th:if="${#fields.hasErrors('confirmarPasswordEncargado')}" th:errors="*{confirmarPasswordEncargado}"></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <div class="d-flex gap-3 justify-content-center mt-4">
                            <button type="submit" class="btn btn-amber btn-lg">
                                <i class="bi bi-rocket-takeoff me-2"></i>Crear empresa
                            </button>
                            <a th:href="@{/}" class="btn btn-outline-secondary btn-lg">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>
    
    <div th:replace="~{fragments/footer :: footer}"></div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/app.js}"></script>
</body>
</html>
