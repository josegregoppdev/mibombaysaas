<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión - MiBombay</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="mb-auth">
    <div th:replace="~{fragments/navbar :: navbar}"></div>
    
    <main class="mb-main d-flex align-items-center">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-6 col-lg-5">
                    <div class="card shadow-lg border-0">
                        <div class="card-body p-5">
                            <div class="text-center mb-4">
                                <h1 class="mb-brand fs-2">
                                    <span class="mb-brand-mi">Mi</span><span class="mb-brand-bombay">Bombay</span>
                                </h1>
                                <p class="text-muted">Inicia sesión en tu cuenta</p>
                            </div>
                            
                            <div th:if="${error}" class="alert alert-danger" role="alert">
                                <i class="bi bi-exclamation-triangle-fill me-2"></i>
                                <span th:text="${error}">Error</span>
                            </div>
                            <div th:if="${mensaje}" class="alert alert-success" role="alert">
                                <i class="bi bi-check-circle-fill me-2"></i>
                                <span th:text="${mensaje}">Mensaje</span>
                            </div>
                            
                            <form th:action="@{/login}" method="post">
                                <div class="form-floating mb-3">
                                    <input type="email" class="form-control" id="username" name="username" placeholder="nombre@ejemplo.com" required autofocus>
                                    <label for="username">Email</label>
                                </div>
                                
                                <div class="form-floating mb-4">
                                    <input type="password" class="form-control" id="password" name="password" placeholder="Contraseña" required>
                                    <label for="password">Contraseña</label>
                                </div>
                                
                                <button type="submit" class="btn btn-primary w-100 btn-lg">
                                    <i class="bi bi-box-arrow-in-right me-2"></i>Iniciar sesión
                                </button>
                            </form>
                            
                            <div class="text-center mt-4">
                                <p class="mb-0 text-muted">
                                    ¿No tienes cuenta? <a th:href="@{/registro}" class="text-decoration-none">Regístrate aquí</a>
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    
    <div th:replace="~{fragments/footer :: footer}"></div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/app.js}"></script>
</body>
</html>
